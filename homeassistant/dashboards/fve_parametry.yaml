# Generovano scriptem — dashboard Parametry FVE (UX v3: Oblibene + Vse)
title: Parametry FVE
views:
  - title: Oblíbené
    path: oblibene
    icon: mdi:star
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >-
              ## ⭐ Nejpoužívanější parametry

              Co ladíš nejčastěji. Vše ostatní je v záložce **Vše (pokročilé)** nahoře.
              Změna se projeví do minuty.
      - type: grid
        cards:
          - type: heading
            heading: "🌡️ Topení & počasí"
          - type: entities
            show_header_toggle: false
            state_color: true
            entities:
              - entity: input_number.cfg_topeni_nocni_snizeni
              - entity: input_number.cfg_topeni_nocni_od
              - entity: input_number.cfg_topeni_nocni_do
              - entity: input_number.cfg_topeni_nouzova_teplota
              - entity: input_number.cfg_topeni_auto_rezim_outdoor_now_zima
              - entity: input_number.cfg_topeni_auto_rezim_outdoor_now_leto
      - type: grid
        cards:
          - type: heading
            heading: "💰 Ceny & baterie"
          - type: entities
            show_header_toggle: false
            state_color: true
            entities:
              - entity: input_number.cfg_prah_levna_energie
              - entity: input_number.cfg_prah_draha_energie
              - entity: input_number.cfg_prah_ultra_levna_nakup
              - entity: input_number.cfg_max_daily_soc
              - entity: input_number.cfg_night_reserve_kwh
      - type: grid
        cards:
          - type: heading
            heading: "🚗 Auto & 🏊 bazén"
          - type: entities
            show_header_toggle: false
            state_color: true
            entities:
              - entity: input_number.cfg_nabijeni_auta_cena_prah_vyssi
              - entity: input_number.cfg_nabijeni_auta_min_soc
              - entity: input_number.cfg_plan_sell_min_tesla_soc
              - entity: input_number.cfg_filtrace_pool_temp_threshold_c
