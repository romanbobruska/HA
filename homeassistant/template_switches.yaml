- name: "Nibe - Topení"
  unique_id: nibe_topeni
  state: "{{ states('sensor.nibe_stav_topeni') | int(0) == 1 }}"
  turn_on:
    - action: modbus.write_register
      data:
        hub: nibe
        slave: 1
        address: 47371
        value: [1]
  turn_off:
    - action: modbus.write_register
      data:
        hub: nibe
        slave: 1
        address: 47371
        value: [0]
  icon: "{{ 'mdi:radiator' if states('sensor.nibe_stav_topeni') | int(0) == 1 else 'mdi:radiator-off' }}"

