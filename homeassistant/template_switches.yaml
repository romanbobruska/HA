# Přepínač: ON = jednorázové zvýšení teploty TUV (Modbus 48132 = 4), OFF = vypnuto (48132 = 0).
# Registr 48132 "Temporary Lux": 0=Off, 1=3h, 2=6h, 3=12h, 4=One time increase
- name: "Nibe — jednorázové zvýšení TUV"
  unique_id: nibe_tuv_jednorazove_zvyseni
  state: "{{ states('sensor.nibe_temporary_lux') | int(0) == 4 }}"
  turn_on:
    - action: modbus.write_register
      data:
        hub: nibe
        slave: 1
        address: 48132
        value: [4]
  turn_off:
    - action: modbus.write_register
      data:
        hub: nibe
        slave: 1
        address: 48132
        value: [0]
  icon: "{{ 'mdi:water-boiler-alert' if (states('sensor.nibe_temporary_lux') | int(0) == 4) else 'mdi:water-boiler-off' }}"
