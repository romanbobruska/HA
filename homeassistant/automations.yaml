- id: "1739307600001"
  alias: "Nibe TUV komfort - zapis do modbus"
  description: "Při změně input_select zapíše novou hodnotu do Nibe registru 47041"
  triggers:
    - trigger: state
      entity_id: input_select.nibe_tuv_komfort
  conditions:
    - condition: template
      value_template: >
        {% set mapper = {"Ekonomický": "0", "Normální": "1", "Luxusní": "2", "Smart Control": "4"} %}
        {{ mapper.get(states('input_select.nibe_tuv_komfort'), '1') != states('sensor.nibe_rezim_komfortu_tuv') }}
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.nibe_tuv_komfort
              state: "Ekonomický"
          sequence:
            - action: modbus.write_register
              data:
                hub: nibe
                slave: 1
                address: 47041
                value: [0]
        - conditions:
            - condition: state
              entity_id: input_select.nibe_tuv_komfort
              state: "Normální"
          sequence:
            - action: modbus.write_register
              data:
                hub: nibe
                slave: 1
                address: 47041
                value: [1]
        - conditions:
            - condition: state
              entity_id: input_select.nibe_tuv_komfort
              state: "Luxusní"
          sequence:
            - action: modbus.write_register
              data:
                hub: nibe
                slave: 1
                address: 47041
                value: [2]
        - conditions:
            - condition: state
              entity_id: input_select.nibe_tuv_komfort
              state: "Smart Control"
          sequence:
            - action: modbus.write_register
              data:
                hub: nibe
                slave: 1
                address: 47041
                value: [4]
  mode: restart
- id: "1739307600002"
  alias: "Nibe TUV komfort - sync z modbus"
  description: "Při změně modbus sensoru synchronizuje input_select"
  triggers:
    - trigger: state
      entity_id: sensor.nibe_rezim_komfortu_tuv
  conditions:
    - condition: template
      value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown'] }}"
  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.nibe_tuv_komfort
      data:
        option: >
          {% set val = states('sensor.nibe_rezim_komfortu_tuv') | int(-1) %}
          {% if val == 0 %}Ekonomický{% elif val == 1 %}Normální{% elif val == 2 %}Luxusní{% elif val == 4 %}Smart Control{% else %}Normální{% endif %}
  mode: single
- id: "1739307600003"
  alias: "Nibe TUV jednorázový boost"
  description: >
    Po stisku tlačítka nastaví komfort TUV na Luxusní, po uplynutí nastavených minut
    vrátí předchozí volbu (Modbus 47041 přes stávající automatizaci).
  triggers:
    - trigger: state
      entity_id: input_button.nibe_tuv_jednorazovy_boost
  actions:
    - variables:
        predchozi: "{{ states('input_select.nibe_tuv_komfort') }}"
    - if:
        - condition: template
          value_template: "{{ predchozi != 'Luxusní' }}"
      then:
        - action: input_select.select_option
          target:
            entity_id: input_select.nibe_tuv_komfort
          data:
            option: "Luxusní"
        - delay:
            minutes: "{{ states('input_number.nibe_tuv_boost_trvani_min') | int(60) }}"
        - action: input_select.select_option
          target:
            entity_id: input_select.nibe_tuv_komfort
          data:
            option: "{{ predchozi }}"
  mode: restart
- id: "1746052767671"
  alias: Publikuj VIctron
  description: ""
  triggers:
    - trigger: time_pattern
      seconds: /30
  conditions: []
  actions:
    - action: mqtt.publish
      data:
        evaluate_payload: false
        qos: 0
        retain: false
        topic: victron/R/c0619ab69c71/system/0/Serial
  mode: single
- id: "1746747997553"
  alias: Spusť nabíjení auta manuálně
  description: ""
  triggers:
    - trigger: event
      event_type: run
      event_data: {}
  conditions: []
  actions:
    - action: select.select_option
      metadata: {}
      data:
        option: Manual
      target:
        entity_id:
          - select.wallbox_garaz_mod
          - select.wallbox_zahrada_mod
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id:
          - switch.wallbox_garaz_start_stop
          - switch.wallbox_zahrada_start_stop
  mode: single
