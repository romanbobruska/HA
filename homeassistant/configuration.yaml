# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
mqtt: !include mqtt.yaml
modbus: !include modbus.yaml
template:
  #NIBE
  - binary_sensor:
      - name: "Nibe - Kompresory aktivní (binární)"
        unique_id: nibe_kompresory_aktivni_binarni
        state: >
          {# Cpr Status registry 43434/43435: 0=Off, 1=On #}
          {% set ep14 = states('sensor.nibe_kompresor_ep14_zapnuty') | int(0) %}
          {% set ep15 = states('sensor.nibe_kompresor_ep15_zapnuty') | int(0) %}
          {{ ep14 == 1 or ep15 == 1 }}
        icon: >
          {% if is_state('binary_sensor.nibe_kompresory_aktivni_binarni', 'on') %}
            mdi:engine
          {% else %}
            mdi:engine-off
          {% endif %}

  - sensor: !include template_sensors.yaml
  - switch: !include template_switches.yaml

# OVLÁDÁNÍ FVE
# -----------------------------------------------------------------------------
# COMMAND LINE - Čtení JSON souboru s plánem
# -----------------------------------------------------------------------------
command_line:
  - sensor:
      name: "FVE Plan Data"
      unique_id: fve_plan_data
      command: "cat /config/fve_plan.json"
      value_template: "{{ value_json.current_mode | default('normal') }}"
      json_attributes:
        - current_mode
        - current_hour
        - plan
        - last_update
        - blokace_text
        - filtrace_status
      scan_interval: 30

# -----------------------------------------------------------------------------
# INPUT BOOLEANS - Přepínače pro ovládání automatizace
# -----------------------------------------------------------------------------
input_boolean:
  fve_automatizace:
    name: "FVE Automatizace"
    icon: mdi:robot

  fve_prodej_z_baterie:
    name: "Povolit prodej z baterie"
    icon: mdi:battery-arrow-up

  fve_blokace_vybijeni:
    name: "Blokace vybíjení baterie"
    icon: mdi:battery-lock

  pylontech_balancing_ok:
    name: "Pylontech balancování OK"
    icon: mdi:battery-check

# -----------------------------------------------------------------------------
# INPUT NUMBERS - Nastavitelné parametry
# -----------------------------------------------------------------------------

input_number: !include input_numbers.yaml

# -----------------------------------------------------------------------------
# INPUT DATETIME - Časové značky
# -----------------------------------------------------------------------------
input_datetime:
  last_pylontech_balanced:
    name: "Poslední balancování Pylontech"
    has_date: true
    has_time: true
    icon: mdi:battery-sync

# -----------------------------------------------------------------------------
# INPUT SELECT - Výběrové možnosti
# -----------------------------------------------------------------------------
input_select:
  fve_rezim_casu:
    name: "Režim času"
    options:
      - "hodina"
      - "ctvrthodina"
    icon: mdi:clock-outline

  nibe_tuv_komfort:
    name: "Nibe - Komfort TUV"
    options:
      - "Ekonomický"
      - "Normální"
      - "Luxusní"
      - "Smart Control"
    icon: mdi:water-thermometer

  fve_manual_mod:
    name: "Manuální mód"
    options:
      - "🤖 Automaticky"
      - "🟢 Normální provoz"
      - "🟡 Šetřit baterii"
      - "🔵 Nabíjet ze sítě"
      - "🔴 Prodávat do sítě"
      - "🟣 Zákaz přetoků"
      - "⚡ Balancování baterie"
    icon: mdi:cog

  fve_plan_mode:
    name: "FVE Plánovaný mód"
    options:
      - "normal"
      - "setrit"
      - "nabijet_ze_site"
      - "prodavat"
      - "zakaz_pretoku"
    icon: mdi:calendar-clock

  topeni_mod:
    name: "Topení - aktuální mód"
    options:
      - "Patrony"
      - "NIBE"
      - "NIBE + Patrony"
      - "Oběhové"
      - "Vypnuto"
      - "BAZÉN - Patrony"
      - "BAZÉN - NIBE"
      - "BAZÉN - NIBE + Patrony"
    icon: mdi:radiator
